<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/aura.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="/src/style.css" rel="stylesheet">
  <title>Aura | Unleash the future of UI</title>
  <!--
      Apply saved theme BEFORE React mounts to eliminate the white flash.
      Reads localStorage synchronously and sets data-theme on <html>.
      Falls back to "dark" if no preference saved.
    -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
