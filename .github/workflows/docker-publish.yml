name: Docker Image CI/CD

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'aura-web/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ "deploy" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push AURA Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./aura-web
        file: ./aura-web/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/aura-frontend:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aura-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aura-frontend:buildcache,mode=max
